version: "3"

includes:
  env:
    taskfile: ./tasks/env.yml
    dir: .

tasks:
  default:
    desc: "Show available tasks"
    silent: true
    cmds:
      - task --list

  backend:dev:
    desc: Run backend dev server locally with secrets injected from 1Password
    dir: backend
    cmds:
      - op run --env-file=.env -- uv run fastapi dev main.py

  backend:test:
    desc: Run backend tests
    dir: backend
    cmds:
      - uv run pytest tests/ -v

  backend:build:
    desc: Build backend Docker image
    dir: backend
    cmds:
      - docker build -t jobnimbus-backend .

  backend:up:
    desc: Start backend container
    deps: [backend:build]
    cmds:
      - docker run --rm -p 8000:8000 --name jobnimbus-backend jobnimbus-backend

  backend:down:
    desc: Stop backend container
    cmds:
      - docker stop jobnimbus-backend
