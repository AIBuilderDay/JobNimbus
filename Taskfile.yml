version: "3"

includes:
  env:
    taskfile: ./tasks/env.yml
    dir: .

tasks:
  default:
    desc: "Show available tasks"
    silent: true
    cmds:
      - task --list

  up:
    desc: Build + start backend AND frontend together (docker compose, op-resolved secrets)
    deps: [env:_check_op]
    preconditions:
      - sh: test -f frontend/.env.local
        msg: |
          ❌ frontend/.env.local missing
          Run: task env:generate
      - sh: test -f backend/.env
        msg: |
          ❌ backend/.env missing
          Run: task env:generate
    cmds:
      - op run --env-file=backend/.env -- docker compose up --build || test $? -eq 130

  up:detached:
    desc: Same as `task up` but runs detached
    deps: [env:_check_op]
    preconditions:
      - sh: test -f frontend/.env.local
        msg: "frontend/.env.local missing — run: task env:generate"
      - sh: test -f backend/.env
        msg: "backend/.env missing — run: task env:generate"
    cmds:
      - op run --env-file=backend/.env -- docker compose up --build -d

  down:
    desc: Stop backend + frontend (docker compose)
    cmds:
      - docker compose down

  logs:
    desc: Tail logs from backend + frontend (docker compose)
    cmds:
      - docker compose logs -f || test $? -eq 130

  clean:
    desc: Nuke caches, node_modules, and docker state so `task up` rebuilds from scratch
    cmds:
      - docker compose down --remove-orphans 2>/dev/null || true
      - find backend -type d \( -name __pycache__ -o -name .pytest_cache -o -name .ruff_cache -o -name .mypy_cache \) -prune -exec rm -rf {} +
      - rm -rf frontend/node_modules frontend/dist frontend/.vite
      - echo ""
      - echo "Cleaned backend caches, frontend node_modules, and docker containers."
      - echo "Now run 'task up' — docker compose will do a fresh build with current deps."

  clean:all:
    desc: NUKE EVERYTHING — caches, node_modules, .venv, .env files, SQLite DB, docker volumes + images. You will need to re-run `task env:generate`.
    prompt: This wipes .env files and the local SQLite cache (including any precached EagleView reports — ~20 min to rebuild). Continue?
    cmds:
      - docker compose down -v --remove-orphans 2>/dev/null || true
      - docker image rm jobnimbus-backend 2>/dev/null || true
      - find backend -type d \( -name __pycache__ -o -name .pytest_cache -o -name .ruff_cache -o -name .mypy_cache \) -prune -exec rm -rf {} +
      - rm -rf backend/.venv
      - rm -f backend/jobnimbus.db backend/jobnimbus.db-shm backend/jobnimbus.db-wal
      - rm -f backend/.env frontend/.env.local frontend/.env.prod
      - rm -rf frontend/node_modules frontend/dist frontend/.vite
      - echo ""
      - echo "Nuked everything. To rebuild from zero:"
      - echo "  1. task env:generate         — regenerate .env files from 1Password"
      - echo "  2. task up                   — docker compose fresh build"
      - echo "  3. task backend:precache     — optional, re-warm EagleView cache (~20 min)"

  backend:dev:
    desc: Build, start, and tail logs for backend container
    deps: [backend:up]
    cmds:
      - docker logs -f jobnimbus-backend || test $? -eq 130

  backend:test:
    desc: Run backend tests
    dir: backend
    cmds:
      - uv run pytest tests/ -v

  backend:precache:
    desc: Precache EagleView reports for all 10 benchmark properties (~20 min wall-clock)
    dir: backend
    cmds:
      - op run --env-file=.env -- uv run python -m scripts.precache_eagleview

  backend:eagleview-dump:
    desc: One-shot — submit, poll, and dump the raw EagleView sandbox response for ONE address. Pass with `-- "your address"`.
    dir: backend
    cmds:
      - op run --env-file=.env -- uv run python -m scripts.dump_eagleview_payload {{.CLI_ARGS}}

  backend:eagleview-probe:
    desc: Submit ALL 10 benchmark addresses to EagleView sandbox and report which it accepts (no polling, fast)
    dir: backend
    cmds:
      - op run --env-file=.env -- uv run python -m scripts.probe_benchmark_addresses

  frontend:dev:
    desc: Run frontend Vite dev server with secrets injected from 1Password
    dir: frontend
    cmds:
      - op run --env-file=.env.local -- pnpm dev

  backend:build:
    desc: Build backend Docker image
    dir: backend
    cmds:
      - docker build -t jobnimbus-backend .

  backend:up:
    desc: Build and start backend container with secrets resolved from 1Password
    dir: backend
    cmds:
      - docker stop jobnimbus-backend 2>/dev/null || true
      - docker rm jobnimbus-backend 2>/dev/null || true
      - docker volume create jobnimbus-backend-data 2>/dev/null || true
      - docker build --no-cache -t jobnimbus-backend .
      - op run --env-file=.env -- docker run -d -p 8000:8000 -v jobnimbus-backend-data:/app/data -e DATABASE_URL=sqlite:///./data/jobnimbus.db -e GOOGLE_MAPS_API_KEY -e ANTHROPIC_API_KEY -e REPLICATE_API_TOKEN -e EAGLEVIEW_CLIENT_ID -e EAGLEVIEW_CLIENT_SECRET -e EAGLEVIEW_BASE_URL --name jobnimbus-backend jobnimbus-backend

  backend:down:
    desc: Stop backend container
    cmds:
      - docker stop jobnimbus-backend

  backend:logs:
    desc: Tail logs from running backend container
    cmds:
      - docker logs -f jobnimbus-backend || test $? -eq 130

  backend:shell:
    desc: Exec into running backend container
    cmds:
      - docker exec -it jobnimbus-backend /bin/sh

  backend:env-check:
    desc: Print loaded settings (secrets redacted) — sanity check
    dir: backend
    cmds:
      - |
        op run --env-file=.env -- uv run python -c "from settings import settings; print({k: ('***' if any(s in k for s in ['KEY','TOKEN','SECRET']) else v) for k,v in settings.model_dump().items()})"
