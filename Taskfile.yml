version: "3"

includes:
  env:
    taskfile: ./tasks/env.yml
    dir: .

tasks:
  default:
    desc: "Show available tasks"
    silent: true
    cmds:
      - task --list

  backend:dev:
    desc: Build, start, and tail logs for backend container
    deps: [backend:up]
    cmds:
      - docker logs -f jobnimbus-backend

  backend:test:
    desc: Run backend tests
    dir: backend
    cmds:
      - uv run pytest tests/ -v

  frontend:dev:
    desc: Run frontend Vite dev server with secrets injected from 1Password
    dir: frontend
    cmds:
      - op run --env-file=.env.local -- pnpm dev

  backend:build:
    desc: Build backend Docker image
    dir: backend
    cmds:
      - docker build -t jobnimbus-backend .

  backend:up:
    desc: Build and start backend container with secrets resolved from 1Password
    dir: backend
    cmds:
      - docker stop jobnimbus-backend 2>/dev/null || true
      - docker rm jobnimbus-backend 2>/dev/null || true
      - docker build --no-cache -t jobnimbus-backend .
      - op run --env-file=.env -- docker run -d -p 8000:8000 -e GOOGLE_MAPS_API_KEY -e ANTHROPIC_API_KEY -e REPLICATE_API_TOKEN --name jobnimbus-backend jobnimbus-backend

  backend:down:
    desc: Stop backend container
    cmds:
      - docker stop jobnimbus-backend

  backend:logs:
    desc: Tail logs from running backend container
    cmds:
      - docker logs -f jobnimbus-backend

  backend:shell:
    desc: Exec into running backend container
    cmds:
      - docker exec -it jobnimbus-backend /bin/sh

  backend:env-check:
    desc: Print loaded settings (secrets redacted) — sanity check
    dir: backend
    cmds:
      - |
        op run --env-file=.env -- uv run python -c "from settings import settings; print({k: ('***' if any(s in k for s in ['KEY','TOKEN','SECRET']) else v) for k,v in settings.model_dump().items()})"
