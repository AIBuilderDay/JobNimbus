version: '3'

# Env-file generation from 1Password vault `AIBuilderDay`.
#
# Frontend (Vite needs static values) — items prefixed `vite-` are resolved into
#   `frontend/.env.<ENV>` (default ENV=local).
# Backend (resolved at runtime via `op run --env-file=backend/.env`) — `.env`
#   is regenerated from `.env.example` on every run. Both files are git-ignored.

tasks:
  setup:
    desc: "One-time: install 1Password CLI + jq, sign in"
    cmds:
      - ./scripts/setup-1password.sh

  generate:
    desc: "Regenerate frontend/.env.local + backend/.env (use ENV=prod for frontend .env.prod)"
    deps: [_check_op]
    vars:
      ENV: '{{.ENV | default "local"}}'
    cmds:
      - ./scripts/generate-env.sh "{{.ENV}}"
      - cp -f backend/.env.example backend/.env
      - echo "backend/.env regenerated (op:// refs resolve at runtime via op run)"

  status:
    desc: "Show frontend + backend .env file status"
    silent: true
    cmds:
      - |
        echo "Frontend .env files:"
        for env in local prod; do
          if [ -f "frontend/.env.$env" ]; then
            echo "  $env: ✅"
          else
            echo "  $env: ❌"
          fi
        done
        echo "Backend .env file:"
        if [ -f "backend/.env" ]; then
          echo "  .env: ✅"
        else
          echo "  .env: ❌ (run: task env:generate)"
        fi

  clean:
    desc: "Remove generated frontend + backend .env files"
    prompt: "Remove frontend/.env.local, frontend/.env.prod, and backend/.env?"
    cmds:
      - rm -f frontend/.env.local frontend/.env.prod backend/.env
      - echo "Cleaned generated .env files"

  _check_op:
    silent: true
    preconditions:
      - sh: command -v op >/dev/null 2>&1
        msg: |
          ❌ 1Password CLI not installed
          Run: task env:setup
      - sh: op account list >/dev/null 2>&1
        msg: |
          ❌ Not signed in to 1Password
          Run: op signin
