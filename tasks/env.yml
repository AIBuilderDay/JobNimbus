version: '3'

# Frontend env-file generation from 1Password vault `AIBuilderDay`.
# Backend env stays on `op run --env-file=backend/.env` at runtime — no static
# file generated. Only items prefixed `vite-` are pulled into the frontend file.

tasks:
  setup:
    desc: "One-time: install 1Password CLI + jq, sign in"
    cmds:
      - ./scripts/setup-1password.sh

  generate:
    desc: "Generate frontend/.env.local from 1Password (use ENV=prod for .env.prod)"
    deps: [_check_op]
    vars:
      ENV: '{{.ENV | default "local"}}'
    cmds:
      - ./scripts/generate-env.sh "{{.ENV}}"

  status:
    desc: "Show frontend .env file status"
    silent: true
    cmds:
      - |
        echo "Frontend .env files:"
        for env in local prod; do
          if [ -f "frontend/.env.$env" ]; then
            echo "  $env: ✅"
          else
            echo "  $env: ❌"
          fi
        done

  clean:
    desc: "Remove generated frontend .env files"
    prompt: "Remove frontend/.env.local and frontend/.env.prod?"
    cmds:
      - rm -f frontend/.env.local frontend/.env.prod
      - echo "Cleaned generated frontend .env files"

  _check_op:
    silent: true
    preconditions:
      - sh: command -v op >/dev/null 2>&1
        msg: |
          ❌ 1Password CLI not installed
          Run: task env:setup
      - sh: op account list >/dev/null 2>&1
        msg: |
          ❌ Not signed in to 1Password
          Run: op signin
